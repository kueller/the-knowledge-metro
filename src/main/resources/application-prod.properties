spring.datasource.url=${GLITCH_DATABASE_URI}
spring.datasource.username=${KNOWLEDGE_DATABASE_USER}
spring.datasource.password=${KNOWLEDGE_DATABASE_PASSWORD}

spring.sql.init.mode=never

spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.hibernate.ddl-auto=none

application.domain.url = https://knowledge.glitch.paris